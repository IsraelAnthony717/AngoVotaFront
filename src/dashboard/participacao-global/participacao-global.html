
<body>
 <!--corpo inicial-->
  <div class="card">
   <div class="barra">
    <h3 class="title">Participação Global</h3>
      </div>
      <!--organizacao do interior do corpo-->
    <div class="content">
     <!-- borda quadrada e clara do circul0-->
      <div class="circle-container">
       <!--area do circulo-->
        <svg width="200" height="200">
          <circle
            class="bg"
            cx="100"
            cy="100"
            r="80"
          />
          <circle
            class="progress"
            cx="100"
            cy="100"
            r="80"
          />
        </svg>

        <div class="percentage">
          <h1 id="percent">52%</h1>
          <p>Afluência</p>
        </div>
      </div>
<!--as bolinhas coloridas-->
      <div class="stats">
        <div class="item">
          <span class="dot blue"></span>
          <div>
            <p>Votaram</p>
            <strong id="voted">1,77 mil</strong>
          </div>
        </div>

        <div class="item">
          <span class="dot gray"></span>
          <div>
            <p>Abstenção</p>
            <strong id="abstention">100</strong>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

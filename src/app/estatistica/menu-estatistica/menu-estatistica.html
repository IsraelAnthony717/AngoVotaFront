<!-- SIDEBAR CNE ADMIN -->
<div class="sidebar"
  [class.open]="menuFixo || hover"
  (mouseenter)="hover = true"
  (mouseleave)="hover = false">

  <!-- BLOCO 1 — Header -->
  <div class="box1CNE">
    <button class="butoncne" (click)="toggleMenu()">
      <!-- ícone urna/voto -->
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 12l2 2 4-4"/>
        <path d="M3 6h18M3 6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2M3 6l2-3h14l2 3"/>
      </svg>
    </button>
    <h1 class="title">Controlo <span class="title-accent">CNE</span></h1>
  </div>

  <nav>
    <!-- BLOCO 2 — Perfil -->
    <div class="perfil">
      <div class="user">AL</div>
      <div class="titleUser">
        <span class="adm">Admin Logado</span>
        <span class="nivel">Administrador</span>
      </div>
      <div class="user-dot"></div>
    </div>

    <!-- BLOCO 3 — Links principais -->
    <ul class="nav-links">
      <li>
        <a routerLink="/dashboard" routerLinkActive="nav-item-active" class="nav-item">
          <span class="nav-icon">
            <!-- gauge / dashboard -->
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/>
              <path d="M22 2 12 12"/>
            </svg>
          </span>
          <span class="box3">Dashboard</span>
          <span class="nav-badge">Live</span>
        </a>
      </li>
      <li>
        <a routerLink="/eleitores" routerLinkActive="nav-item-active" class="nav-item">
          <span class="nav-icon">
            <!-- users -->
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </span>
          <span class="box3">Eleitores</span>
        </a>
      </li>
      <li>
        <a routerLink="/candidato" routerLinkActive="nav-item-active" class="nav-item">
          <span class="nav-icon">
            <!-- user-tie / candidato -->
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M20 21a8 8 0 1 0-16 0"/>
              <path d="M12 12v9M9 15l3-3 3 3"/>
            </svg>
          </span>
          <span class="box3">Candidatos</span>
        </a>
      </li>
      <li>
        <a routerLink="/relatorio" routerLinkActive="nav-item-active" class="nav-item">
          <span class="nav-icon">
            <!-- file -->
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <line x1="10" y1="9" x2="8" y2="9"/>
            </svg>
          </span>
          <span class="box3">Relatório</span>
        </a>
      </li>
      <li>
        <a routerLink="/estatistica" routerLinkActive="nav-item-active" class="nav-item">
          <span class="nav-icon">
            <!-- chart pie -->
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
              <path d="M22 12A10 10 0 0 0 12 2v10z"/>
            </svg>
          </span>
          <span class="box3">Estatísticas</span>
        </a>
      </li>
    </ul>

    <!-- BLOCO 4 — Segurança -->
    <div class="seguranca">
      <p class="titleseguranca">Segurança</p>
      <ul class="nav-links">
        <li>
          <a routerLink="/acesso" routerLinkActive="nav-item-active" class="nav-item">
            <span class="nav-icon">
              <!-- shield -->
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <path d="M9 12l2 2 4-4"/>
              </svg>
            </span>
            <span class="box3">Controle de Acesso</span>
          </a>
        </li>
      </ul>
    </div>

  </nav>

  <!-- BLOCO 5 — Sair -->
  <div class="sistema">
    <button class="butonsistema">
      <span class="nav-icon nav-icon-red">
        <!-- logout -->
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <span>Sair do Sistema</span>
    </button>
  </div>

</div>
